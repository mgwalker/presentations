name: deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build and deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: build the site
        run: |
          npm ci
          npm run build

      - name: upload artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v5
